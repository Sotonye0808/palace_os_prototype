<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile Settings — FoliXx Hospitality</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAF8; --surface: #FFFFFF; --fg: #1A1614; --muted: #7A706A;
      --border: #E8E4DD; --primary: #E85D1A; --primary-light: #FFF5ED;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, system-ui, sans-serif;
      --xs:0.75rem;--sm:0.875rem;--base:1rem;--lg:1.125rem;--xl:1.25rem;--2xl:1.5rem;--3xl:1.875rem;
      --radius-xl:1rem;--radius-full:9999px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background: var(--bg); color: var(--fg);
      font: var(--base)/1.6 var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    .top-bar {
      display:flex; align-items:center; gap:12px;
      padding:16px 24px; background:var(--surface); border-bottom:1px solid var(--border);
    }
    .top-bar a { color:var(--muted); text-decoration:none; font-size:var(--sm); display:flex; align-items:center; gap:4px; }
    .top-bar a:hover { color:var(--primary); }

    .page { max-width:680px; margin:0 auto; padding:24px; }
    .page h1 { font-family:var(--font-display); font-size:var(--3xl); margin-bottom:24px; }

    .profile-header {
      display:flex; align-items:center; gap:20px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-xl); padding:24px;
      margin-bottom:24px;
    }
    .profile-header .avatar-lg {
      width:80px; height:80px; border-radius:50%;
      background:var(--primary); display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:36px; font-weight:700; font-family:var(--font-display); flex-shrink:0;
    }
    .profile-header .info .name { font-weight:700; font-size:var(--lg); }
    .profile-header .info .email { color:var(--muted); font-size:var(--sm); }
    .profile-header .change-btn {
      margin-left:auto; padding:8px 16px;
      border:1px solid var(--border); border-radius:var(--radius-full);
      background:transparent; font-size:var(--xs); font-weight:500; cursor:pointer;
      color:var(--muted); transition:all 0.2s;
    }
    .profile-header .change-btn:hover { border-color:var(--primary); color:var(--primary); }

    .form-section {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-xl); padding:24px;
      margin-bottom:16px;
    }
    .form-section h2 { font-family:var(--font-display); font-size:var(--xl); margin-bottom:16px; }

    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-group { margin-bottom:16px; }
    .form-group label {
      display:block; font-size:var(--xs); text-transform:uppercase;
      letter-spacing:0.05em; color:var(--muted); font-weight:600; margin-bottom:4px;
    }
    .form-group input, .form-group select {
      width:100%; padding:10px 14px;
      border:1px solid var(--border); border-radius:10px;
      background:var(--bg); color:var(--fg); font-size:var(--sm);
      font-family:var(--font-body); transition:border-color 0.2s; outline:none;
    }
    .form-group input:focus, .form-group select:focus { border-color:var(--primary); }
    .form-group .hint { font-size:10px; color:var(--muted); margin-top:4px; }

    .save-btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:12px 32px; background:var(--primary); color:#fff;
      border:none; border-radius:var(--radius-full); font-size:var(--sm);
      font-weight:600; cursor:pointer; transition:all 0.3s;
    }
    .save-btn:hover { background:#C44510; }

    .saved-toast {
      display:none; position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%);
      padding:12px 24px; background:#2E7D52; color:#fff;
      border-radius:var(--radius-full); font-size:var(--sm);
      box-shadow:0 4px 20px rgba(0,0,0,0.15);
      animation:slideUp 0.3s ease;
    }
    .saved-toast.show { display:block; }
    @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

    @media (max-width: 480px) {
      .form-row { grid-template-columns:1fr; }
      .profile-header { flex-direction:column; text-align:center; }
      .profile-header .change-btn { margin-left:0; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="account-hub.html">← Back to Account</a>
  </div>

  <div class="page">
    <h1>Profile <span style="color:var(--primary)">Settings</span></h1>

    <div class="profile-header">
      <div class="avatar-lg">C</div>
      <div class="info">
        <div class="name">Chioma Okafor</div>
        <div class="email">chioma@example.com</div>
        <div style="font-size:var(--xs);color:var(--muted);margin-top:4px">Joined March 2024</div>
      </div>
      <button class="change-btn" onclick="document.getElementById('avatarInput').click()">Change Photo</button>
      <input type="file" id="avatarInput" accept="image/*" style="display:none" />
    </div>

    <div class="form-section">
      <h2>Personal Information</h2>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" value="Chioma" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" value="Okafor" />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" value="chioma@example.com" />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" value="+234 802 345 6789" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" value="1995-04-15" />
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select>
            <option>Female</option>
            <option>Male</option>
            <option>Prefer not to say</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Delivery Address</h2>
      <div class="form-group">
        <label>Street Address</label>
        <input type="text" value="15 Awolowo Road" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" value="Ikoyi" />
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" value="Lagos" />
        </div>
      </div>
      <div class="form-group">
        <label>Default Order Type</label>
        <select>
          <option>Delivery</option>
          <option>Takeaway</option>
          <option>Dine-in</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <h2>Notification Preferences</h2>
      <div style="display:flex;flex-direction:column;gap:12px">
        <label style="display:flex;align-items:center;gap:10px;font-size:var(--sm);cursor:pointer">
          <input type="checkbox" checked /> Order status updates (SMS & Email)
        </label>
        <label style="display:flex;align-items:center;gap:10px;font-size:var(--sm);cursor:pointer">
          <input type="checkbox" checked /> Promotional offers & discounts
        </label>
        <label style="display:flex;align-items:center;gap:10px;font-size:var(--sm);cursor:pointer">
          <input type="checkbox" /> Loyalty points reminders
        </label>
        <label style="display:flex;align-items:center;gap:10px;font-size:var(--sm);cursor:pointer">
          <input type="checkbox" checked /> Event invitations (Secrets Palace)
        </label>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px">
      <button class="save-btn" onclick="showToast()">💾 Save Changes</button>
      <a href="#" style="color:#C0392B;font-size:var(--xs);text-decoration:none">Delete Account</a>
    </div>
  </div>

  <div class="saved-toast" id="toast">✓ Changes saved successfully</div>

  <script>
    function showToast() {
      var t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 3000);
    }
  </script>
</body>
</html>
